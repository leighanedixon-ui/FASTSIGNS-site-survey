<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FASTSIGNS Г‚В· Survey Dashboard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red: #E31837;
  --dark: #231F20;
  --gray: #6B7280;
  --light: #F3F4F6;
  --border: #E5E7EB;
  --white: #FFFFFF;
  --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.15);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--light);
  color: var(--dark);
  min-height: 100vh;
}

/* ГўВ”ВЂГўВ”ВЂ Gate ГўВ”ВЂГўВ”ВЂ */
#gate {
  position: fixed; inset: 0; z-index: 200;
  display: flex; align-items: center; justify-content: center;
  background: var(--dark);
}
.gate-card {
  background: var(--white);
  border-radius: 14px;
  padding: 2.5rem 2.25rem;
  width: 100%; max-width: 360px;
  box-shadow: var(--shadow-lg);
  text-align: center;
}
.gate-wordmark { font-size: 1.6rem; font-weight: 900; letter-spacing: -1px; color: var(--red); }
.gate-sub { color: var(--gray); font-size: .875rem; margin: .375rem 0 2rem; }
.gate-input {
  width: 100%; padding: .75rem 1rem;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 1rem; outline: none; transition: border-color .15s;
  margin-bottom: .875rem;
}
.gate-input:focus { border-color: var(--red); }
.gate-btn {
  width: 100%; padding: .8rem;
  background: var(--red); color: white;
  border: none; border-radius: 8px;
  font-size: 1rem; font-weight: 700; cursor: pointer;
  transition: opacity .15s;
}
.gate-btn:hover { opacity: .88; }
.gate-err { color: var(--red); font-size: .8rem; margin-top: .75rem; min-height: 1.1em; }

/* ГўВ”ВЂГўВ”ВЂ Header ГўВ”ВЂГўВ”ВЂ */
header {
  background: var(--dark);
  padding: .875rem 2rem;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
}
.hd-logo { font-size: 1.05rem; font-weight: 800; color: var(--white); letter-spacing: -.25px; }
.hd-logo em { color: var(--red); font-style: normal; }
.hd-date { font-size: .78rem; color: rgba(255,255,255,.45); }

/* ГўВ”ВЂГўВ”ВЂ Stats ГўВ”ВЂГўВ”ВЂ */
.stats {
  display: grid; grid-template-columns: repeat(3,1fr); gap: .875rem;
  padding: 1.5rem 2rem 1rem;
}
.stat {
  background: var(--white); border-radius: 10px;
  padding: 1.125rem 1.375rem; box-shadow: var(--shadow);
}
.stat-label { font-size: .7rem; color: var(--gray); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }
.stat-val { font-size: 2rem; font-weight: 800; color: var(--dark); line-height: 1.15; }
.stat-sub { font-size: .72rem; color: var(--gray); margin-top: .2rem; }

/* ГўВ”ВЂГўВ”ВЂ Controls ГўВ”ВЂГўВ”ВЂ */
.controls {
  padding: 0 2rem .875rem;
  display: flex; gap: .625rem; flex-wrap: wrap; align-items: center;
}
.search-wrap { flex: 1; min-width: 180px; position: relative; }
.search-ico {
  position: absolute; left: .75rem; top: 50%; transform: translateY(-50%);
  color: var(--gray); pointer-events: none; width: 14px; height: 14px;
}
.ctrl-input {
  width: 100%; padding: .6rem .75rem .6rem 2.2rem;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: .86rem; background: var(--white); outline: none;
  transition: border-color .15s;
}
.ctrl-input:focus { border-color: var(--red); }
input.date-input {
  padding: .6rem .75rem;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: .86rem; background: var(--white); outline: none;
  color: var(--dark); cursor: pointer;
}
input.date-input:focus { border-color: var(--red); }
.btn-clear {
  padding: .6rem 1rem;
  background: var(--white); color: var(--gray);
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: .8rem; font-weight: 600; cursor: pointer;
}
.btn-clear:hover { border-color: var(--red); color: var(--red); }

/* ГўВ”ВЂГўВ”ВЂ Table ГўВ”ВЂГўВ”ВЂ */
.tbl-wrap { padding: 0 2rem 2rem; }
.tbl-card {
  background: var(--white); border-radius: 10px;
  box-shadow: var(--shadow); overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead { background: #F9FAFB; }
th {
  padding: .7rem 1.25rem;
  text-align: left; font-size: .7rem; font-weight: 700;
  color: var(--gray); text-transform: uppercase; letter-spacing: .07em;
  border-bottom: 1px solid var(--border);
}
td {
  padding: .8rem 1.25rem; font-size: .875rem;
  border-bottom: 1px solid var(--border); vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: #FAFAFA; }
.site-badge {
  display: inline-block; padding: .225rem .625rem;
  background: #FEE2E2; color: var(--red);
  border-radius: 4px; font-size: .72rem; font-weight: 800; letter-spacing: .06em;
}
.dt { font-weight: 600; }
.tm { color: var(--gray); }
.fn { color: #9CA3AF; font-size: .78rem; font-family: monospace; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.acts { display: flex; gap: .4rem; }
.btn {
  padding: .3rem .65rem; border-radius: 5px;
  font-size: .75rem; font-weight: 700; cursor: pointer; border: none;
  transition: opacity .15s, transform .1s;
}
.btn:hover { opacity: .85; transform: translateY(-1px); }
.btn-view { background: var(--dark); color: white; }
.btn-pdf  { background: var(--red);  color: white; }
.btn-json { background: var(--light); color: var(--dark); border: 1px solid var(--border); }

/* ГўВ”ВЂГўВ”ВЂ Empty / Loading ГўВ”ВЂГўВ”ВЂ */
.empty td { text-align: center; padding: 3rem; color: var(--gray); }
.spin {
  width: 28px; height: 28px; margin: 0 auto .875rem;
  border: 3px solid var(--border); border-top-color: var(--red);
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ГўВ”ВЂГўВ”ВЂ Modal ГўВ”ВЂГўВ”ВЂ */
#modal {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,.55);
  align-items: center; justify-content: center; padding: 1rem;
}
#modal.open { display: flex; }
.modal-card {
  background: white; border-radius: 12px;
  width: 100%; max-width: 1100px; height: 90vh;
  display: flex; flex-direction: column;
  box-shadow: var(--shadow-lg); overflow: hidden;
}
.modal-hd {
  padding: .875rem 1.25rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: .75rem; flex-shrink: 0;
}
.modal-title { font-weight: 700; font-size: .95rem; flex: 1; }
.modal-acts { display: flex; gap: .5rem; align-items: center; }
.modal-close {
  width: 30px; height: 30px; background: var(--light);
  border: none; border-radius: 50%; font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center; color: var(--gray);
}
.modal-close:hover { background: var(--border); }
.modal-loading {
  flex: 1; display: flex; align-items: center; justify-content: center;
  flex-direction: column; color: var(--gray); gap: .5rem;
}
#survey-frame { flex: 1; border: none; width: 100%; display: none; }

/* ГўВ”ВЂГўВ”ВЂ Responsive ГўВ”ВЂГўВ”ВЂ */
@media (max-width: 680px) {
  .stats { grid-template-columns: 1fr 1fr; }
  header, .stats, .controls, .tbl-wrap { padding-left: 1rem; padding-right: 1rem; }
  th:nth-child(3), td:nth-child(3),
  th:nth-child(4), td:nth-child(4) { display: none; }
}
@media (max-width: 420px) {
  .stats { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ГўВ”ВЂГўВ”ВЂ Password Gate ГўВ”ВЂГўВ”ВЂ -->
<div id="gate">
  <div class="gate-card">
    <div class="gate-wordmark">FASTSIGNS</div>
    <div class="gate-sub">Survey Dashboard &mdash; Team Access</div>
    <input id="pw" class="gate-input" type="password" placeholder="Team password" autocomplete="current-password" />
    <button class="gate-btn" onclick="unlock()">Sign In</button>
    <div class="gate-err" id="gate-err"></div>
  </div>
</div>

<!-- ГўВ”ВЂГўВ”ВЂ App ГўВ”ВЂГўВ”ВЂ -->
<div id="app" style="display:none">
  <header>
    <div class="hd-logo"><em>FAST</em>SIGNS &middot; Survey Dashboard</div>
    <div class="hd-date" id="hd-date"></div>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Total Surveys</div>
      <div class="stat-val" id="s-total">&mdash;</div>
      <div class="stat-sub">all time</div>
    </div>
    <div class="stat">
      <div class="stat-label">Sites Covered</div>
      <div class="stat-val" id="s-sites">&mdash;</div>
      <div class="stat-sub">unique site codes</div>
    </div>
    <div class="stat">
      <div class="stat-label">Latest Survey</div>
      <div class="stat-val" id="s-latest" style="font-size:1.2rem;padding-top:.3rem">&mdash;</div>
      <div class="stat-sub" id="s-latest-site"></div>
    </div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg class="search-ico" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7"/><path d="m21 21-4.5-4.5"/>
      </svg>
      <input id="q" type="text" class="ctrl-input" placeholder="Search site codeГўВЂВ¦" oninput="render()" />
    </div>
    <input id="d-from" type="date" class="date-input" onchange="render()" title="From date" />
    <input id="d-to"   type="date" class="date-input" onchange="render()" title="To date" />
    <button class="btn-clear" onclick="clearFilters()">Clear</button>
  </div>

  <div class="tbl-wrap">
    <div class="tbl-card">
      <table>
        <thead>
          <tr>
            <th>Site Code</th>
            <th>Date</th>
            <th>Time</th>
            <th>File</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr class="empty">
            <td colspan="5">
              <div class="spin"></div>
              Loading surveys&hellip;
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ГўВ”ВЂГўВ”ВЂ Survey Modal ГўВ”ВЂГўВ”ВЂ -->
<div id="modal">
  <div class="modal-card">
    <div class="modal-hd">
      <div class="modal-title" id="modal-title">Survey</div>
      <div class="modal-acts">
        <button class="btn btn-pdf" onclick="doPrint()">Г°ВџВ–ВЁ Print / PDF</button>
        <button class="btn btn-json" onclick="doJson()">ГўВ†В“ JSON</button>
        <button class="modal-close" onclick="closeModal()" title="Close">ГўВњВ•</button>
      </div>
    </div>
    <div class="modal-loading" id="modal-spin">
      <div class="spin"></div>
      <span>Loading survey&hellip;</span>
    </div>
    <iframe id="survey-frame" sandbox="allow-same-origin allow-scripts allow-popups"></iframe>
  </div>
</div>

<script>
const API = '/.netlify/functions/surveys-api';
let PW = '';
let ALL = [];
let current = null;

/* ГўВ”ВЂГўВ”ВЂ helpers ГўВ”ВЂГўВ”ВЂ */
const fmtDate = d => d && d.length === 8
  ? `${d.slice(4,6)}/${d.slice(6,8)}/${d.slice(0,4)}` : (d || 'ГўВЂВ”');
const fmtTime = t => {
  if (!t || t.length !== 4) return t || 'ГўВЂВ”';
  const h = parseInt(t.slice(0,2)), m = t.slice(2);
  return `${h%12||12}:${m} ${h>=12?'PM':'AM'}`;
};

/* ГўВ”ВЂГўВ”ВЂ auth ГўВ”ВЂГўВ”ВЂ */
async function callApi(qs) {
  const r = await fetch(`${API}?${qs}`, { headers: { 'x-dashboard-password': PW } });
  return r;
}

async function unlock() {
  const entered = document.getElementById('pw').value.trim();
  if (!entered) return;
  const err = document.getElementById('gate-err');
  err.textContent = '';
  const r = await fetch(`${API}?action=list`, { headers: { 'x-dashboard-password': entered } });
  if (r.status === 401) { err.textContent = 'Incorrect password. Please try again.'; return; }
  if (!r.ok) { err.textContent = 'Server error ГўВЂВ” check Netlify env vars.'; return; }
  PW = entered;
  sessionStorage.setItem('fs_pw', PW);
  ALL = await r.json();
  boot();
}

document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

/* Try saved session */
(async () => {
  const saved = sessionStorage.getItem('fs_pw');
  if (!saved) return;
  const r = await fetch(`${API}?action=list`, { headers: { 'x-dashboard-password': saved } });
  if (r.ok) { PW = saved; ALL = await r.json(); boot(); }
})();

/* ГўВ”ВЂГўВ”ВЂ boot ГўВ”ВЂГўВ”ВЂ */
function boot() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display  = 'block';
  document.getElementById('hd-date').textContent =
    new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  updateStats();
  render();
}

/* ГўВ”ВЂГўВ”ВЂ stats ГўВ”ВЂГўВ”ВЂ */
function updateStats() {
  const sites = new Set(ALL.map(s => s.siteCode));
  document.getElementById('s-total').textContent = ALL.length;
  document.getElementById('s-sites').textContent = sites.size;
  if (ALL.length) {
    const lat = ALL[0];
    document.getElementById('s-latest').textContent = fmtDate(lat.date);
    document.getElementById('s-latest-site').textContent = lat.siteCode;
  }
}

/* ГўВ”ВЂГўВ”ВЂ table ГўВ”ВЂГўВ”ВЂ */
function render() {
  const q = document.getElementById('q').value.toLowerCase();
  const df = (document.getElementById('d-from').value || '').replace(/-/g,'');
  const dt = (document.getElementById('d-to').value   || '').replace(/-/g,'');

  const rows = ALL.filter(s => {
    if (q && !s.siteCode.toLowerCase().includes(q)) return false;
    if (df && s.date && s.date < df) return false;
    if (dt && s.date && s.date > dt) return false;
    return true;
  });

  const tbody = document.getElementById('tbody');
  if (!rows.length) {
    tbody.innerHTML = `<tr class="empty"><td colspan="5">No surveys match your filters.</td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map((s,i) => `
    <tr>
      <td><span class="site-badge">${esc(s.siteCode)}</span></td>
      <td class="dt">${fmtDate(s.date)}</td>
      <td class="tm">${fmtTime(s.time)}</td>
      <td><span class="fn" title="${esc(s.nameWithoutExt)}">${esc(s.nameWithoutExt)}</span></td>
      <td class="acts">
        <button class="btn btn-view" onclick="viewSurvey(${i})">View</button>
        <button class="btn btn-pdf"  onclick="printSurvey(${i})">PDF</button>
        <button class="btn btn-json" onclick="dlJson(${i})">JSON</button>
      </td>
    </tr>`).join('');

  /* store filtered rows so index references work */
  window._rows = rows;
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function clearFilters() {
  document.getElementById('q').value = '';
  document.getElementById('d-from').value = '';
  document.getElementById('d-to').value = '';
  render();
}

/* ГўВ”ВЂГўВ”ВЂ survey view ГўВ”ВЂГўВ”ВЂ */
async function viewSurvey(idx) {
  const s = window._rows[idx];
  current = s;
  document.getElementById('modal-title').textContent =
    `${s.siteCode} Г‚В· ${fmtDate(s.date)} ${fmtTime(s.time)}`;
  document.getElementById('modal').classList.add('open');
  document.getElementById('modal-spin').style.display = 'flex';
  const frame = document.getElementById('survey-frame');
  frame.style.display = 'none';

  try {
    const r = await callApi(`action=get-html&path=${encodeURIComponent(s.htmlPath)}`);
    if (!r.ok) throw new Error(await r.text());
    const html = await r.text();
    const blob = new Blob([html], { type: 'text/html' });
    frame.onload = () => {
      document.getElementById('modal-spin').style.display = 'none';
      frame.style.display = 'block';
    };
    frame.src = URL.createObjectURI(blob);
  } catch (e) {
    document.getElementById('modal-spin').innerHTML =
      `<p style="color:var(--red)">Error: ${esc(e.message)}</p>`;
  }
}

async function printSurvey(idx) {
  const s = window._rows ? window._rows[idx] : current;
  if (!s) return;
  const r = await callApi(`action=get-html&path=${encodeURIComponent(s.htmlPath)}`);
  const html = await r.text();
  const w = window.open('','_blank');
  w.document.write(html);
  w.document.close();
  setTimeout(() => w.print(), 600);
}

async function dlJson(idx) {
  const s = window._rows ? window._rows[idx] : current;
  if (!s) return;
  const r = await callApi(`action=get-json&path=${encodeURIComponent(s.jsonPath)}`);
  const text = await r.text();
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([text], { type:'application/json' })),
    download: s.filename
  });
  a.click();
}

/* modal toolbar */
function doPrint() { if (current) printSurvey(null); }
async function doJson()  { if (current) {
  const r = await callApi(`action=get-json&path=${encodeURIComponent(current.jsonPath)}`);
  const text = await r.text();
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([text], {type:'application/json'})),
    download: current.filename
  });
  a.click();
}}
async function doPrintCurrent() {
  if (!current) return;
  const r = await callApi(`action=get-html&path=${encodeURIComponent(current.htmlPath)}`);
  const html = await r.text();
  const w = window.open('','_blank');
  w.document.write(html); w.document.close();
  setTimeout(() => w.print(), 600);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('survey-frame').src = '';
  current = null;
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* fix doPrint to use current */
window.doPrint = doPrintCurrent;
</script>
</body>
</html>
